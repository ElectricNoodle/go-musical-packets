name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libpcap-dev libasound2-dev

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.24.x"
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Test
        run: go test ./...

      - name: Test without CGO
        run: CGO_ENABLED=0 go test ./...

      - name: Test with race detector
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /tmp/musical-packets ./cmd/musical-packets
